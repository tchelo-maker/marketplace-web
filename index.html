<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOVIX | Tecnologia Premium</title>
<link rel="stylesheet" href="css/style.css">
<script src="body.java"></script>

</head>
<body>

<header>
    <a class="logo" href="index.html">MOVIX</div>
    <nav>
        <a href="#">Início</a>
        <a href="#produtos">Produtos</a>
        <a href="login.html" > Login/Cadaster</a>
        <a href="#" onclick="toggleCart(event)"> 🛒</a>
    </nav>
     
    </div>
</header>

<section class="hero">
    <h1>Tecnologia Premium</h1>
    <p>iPhones e acessórios com qualidade garantida.</p>
    <button onclick="scrollToProdutos()">Ver Produtos</button>
</section>

<section id="produtos" class="produtos">
    <h2>Nossos Produtos</h2>
    <div class="grid">

        <div class="card">
            <img src="img/Apple-iPhone-15-lineup-hero-geo-230912_inline.jpg.large.jpg">
            <h3>iPhone 15</h3>
            <p>R$ 5.999</p>
            <button onclick="addToCart('iPhone 15', 5999)">Comprar</button>
        </div>

        <div class="card">
            <img src="img/airpods.jpg">
            <h3>AirPods</h3>
            <p>R$ 1.299</p>
            <button onclick="addToCart('AirPods', 1299)">Comprar</button>
        </div>

        <div class="card">
            <img src="img/iphone 17 pro max.jpg">
            <h3>Iphone 17 PRO MAX</h3>
            <p>R$10.000</p>
            <button onclick="addToCart('Carregador Turbo', 10000)">Comprar</button>
        </div>

    </div>
</section>

<div class="cart" id="cart">
    <div class="aba-conteudo">  
        <a href="#" id="botao-fechar" onclick="toggleCart(event)"> X</a>
        <h2>Seu Carrinho</h2>
        <div id="cartItems"></div>
        <h3 id="total">Total: R$ 0</h3>
        <button onclick="checkout()">Finalizar Compra</button>
     </div>  
</div>

<footer>
    © 2026 MOVIX - Todos os direitos reservados
</footer>

<script src="JS/APP.js"></script>

</body>
</html>
